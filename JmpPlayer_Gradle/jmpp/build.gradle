plugins {
    // Apply the application plugin to add support for building a CLI application in Java.
    id 'application'
    id 'eclipse'
}

sourceSets {
    main {
        java {
            srcDirs = ['src']
        }
        resources {
            srcDirs = ['src']
            // 全ての .properties と .png (iconフォルダ内含む) を許可
            include '**/*.properties'
            include 'icon/**/*.png'
            
            // Javaファイルは除外
            exclude '**/*.java'
        }
    }
}

repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()
}

dependencies {
    implementation project(':jmplib')
    implementation project(':jmsynth')
    implementation project(':ffmpegw')
    implementation project(':flib')
    implementation project(':mkjmp')
}

testing {
    suites {
        // Configure the built-in test suite
        test {
            // Use JUnit Jupiter test framework
            useJUnitJupiter('6.0.1')
        }
    }
}

// Apply a specific Java toolchain to ease working on different environments.
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

application {
    mainClass = 'jmp.JMPPlayer'
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}

jar {
    archiveBaseName = 'JMPPlayer'
}

task fatJar(type: Jar) {
    group = 'build'
    description = 'Builds a fat JAR including all dependencies'

    archiveBaseName.set('JMPPlayer')
    archiveClassifier.set('')
    archiveVersion.set('1.0')

    // 1. 最新のGradleでは重複戦略の指定が必須に近い
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE

    // 2. 自分のプロジェクトのクラスファイル
    from sourceSets.main.output

    // 3. 依存関係（他のプロジェクトや外部ライブラリ）の展開
    // runtimeClasspath.collect は Gradle 9.x で警告やエラーの原因になるため files() でラップ
    from {
        configurations.runtimeClasspath.filter { it.exists() }.collect { 
            it.isDirectory() ? it : zipTree(it) 
        }
    }

    manifest {
        attributes('Main-Class': 'jmp.JMPPlayer')
    }
}